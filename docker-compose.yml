version: '3.8'

services:
  smartmail-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmail-ai-backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=sqlite+aiosqlite:///./smartmail.db
    volumes:
      - smartmail-data:/app/storage
    depends_on:
      - qdrant
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: smartmail-qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

volumes:
  smartmail-data:
  qdrant-data:
